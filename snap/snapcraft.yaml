name: mont-curriculum
base: core22
version: '1.0'
icon: snap/gui/icon.png
summary: Premium Resume Builder with Modern Design
description: |
  Monte Curriculum is a state-of-the-art resume builder application.
  Create high-impact resumes with a modern glassmorphism interface.
  Features include a 7-step smart wizard, intelligent data import from PDF/Word,
  and professional exports in PDF and DOCX formats.

grade: stable
confinement: strict

architectures:
  - build-on: amd64

apps:
  mont-curriculum:
    command: bin/mont-curriculum
    extensions: [gnome]
    desktop: gui/mont-curriculum.desktop
    environment:
      GTK_PATH: ${SNAP}/usr/lib/x86_64-linux-gnu/gtk-3.0
      GTK_USE_PORTAL: 1
      LD_LIBRARY_PATH: ${SNAP_LIBRARY_PATH}${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}
    plugs:
      - home
      - network
      - opengl
      - wayland
      - x11
      - gpu-2204

parts:
  mont-curriculum:
    plugin: nil
    source: .
    build-packages:
      - libgtk-3-dev
      - libwebkit2gtk-4.0-dev
      - pkg-config
    build-snaps:
      - go/1.24/stable
      - node/20/stable
    stage-packages:
      - libgtk-3-0
      - libwebkit2gtk-4.0-37
    override-build: |
      # Path setup for Snapcraft build environment
      export GOPATH=$HOME/go
      export PATH=$HOME/go/bin:/usr/local/bin:$PATH
      
      # Install Wails CLI using the correct Go version
      go install github.com/wailsapp/wails/v2/cmd/wails@latest
      
      # Build the application (Frontend + Backend)
      wails build -clean
      
      # Install the binary
      mkdir -p $SNAPCRAFT_PART_INSTALL/bin
      cp build/bin/mont_curriculum $SNAPCRAFT_PART_INSTALL/bin/mont-curriculum
      
      # Copy GUI assets
      mkdir -p $SNAPCRAFT_PART_INSTALL/gui
      cp snap/gui/icon.png $SNAPCRAFT_PART_INSTALL/gui/icon.png
      cp snap/gui/mont-curriculum.desktop $SNAPCRAFT_PART_INSTALL/gui/mont-curriculum.desktop
